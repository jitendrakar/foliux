{% extends "base.html" %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 51, 102, 0.1);
    }
    .form-label {
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
    }
    .form-control {
        border-radius: 12px;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        transition: all 0.3s;
    }
    .form-control:focus {
        border-color: #003366;
        box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
    }
    .btn-submit {
        background: linear-gradient(135deg, #003366 0%, #00509e 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 51, 102, 0.2);
        color: white;
    }
    .help-text {
        font-size: 0.85rem;
        color: #64748b;
        margin-top: 4px;
    }
    .autocomplete-results {
        position: absolute;
        z-index: 1000;
        background: white;
        border: 1px solid #e2e8f0;
        width: 100%;
        max-height: 250px;
        overflow-y: auto;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        margin-top: 5px;
    }
    .autocomplete-item {
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.2s;
    }
    .autocomplete-item:hover { background-color: #f8fafc; }

    .text-nps {
        color: #003366;
    }

    /* ===== DARK MODE OVERRIDES ===== */
    html[data-theme="dark"] .form-container {
        background: var(--global-dark-card) !important;
        border-color: var(--global-dark-border) !important;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3) !important;
    }
    html[data-theme="dark"] .form-label {
        color: #94a3b8 !important;
    }
    html[data-theme="dark"] .text-nps {
        color: #93c5fd !important;
    }
    html[data-theme="dark"] .form-control {
        border-color: var(--global-dark-border) !important;
        background-color: var(--global-dark-bg) !important;
        color: var(--global-dark-text) !important;
    }
    html[data-theme="dark"] .form-control:focus {
        border-color: #93c5fd !important;
        box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.15) !important;
    }
    html[data-theme="dark"] .btn-submit {
        background: linear-gradient(135deg, #00509e 0%, #3b82f6 100%) !important;
    }
    html[data-theme="dark"] .btn-submit:hover {
        box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2) !important;
    }
    html[data-theme="dark"] .autocomplete-results {
        background-color: var(--global-dark-card) !important;
        border-color: var(--global-dark-border) !important;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
    }
    html[data-theme="dark"] .autocomplete-item {
        color: var(--global-dark-text) !important;
        border-bottom-color: var(--global-dark-border) !important;
    }
    html[data-theme="dark"] .autocomplete-item:hover {
        background-color: var(--global-dark-bg) !important;
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const nameInput = document.getElementById('fund_name');
    const resultsDiv = document.getElementById('nps-autocomplete-results');
    const navInput = document.getElementById('avg_nav');
    const unitsInput = document.getElementById('units');
    const amountInput = document.getElementById('invested_amount');

    const reportMissingInstrument = (query) => {
        fetch('/api/report-missing-instrument/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ name: query, type: 'NPS' })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ok') {
                alert(data.message);
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(err => {
            console.error('Error reporting instrument:', err);
            alert('An error occurred. Please try again.');
        });
    };

    nameInput.addEventListener('input', function() {
        const rawQuery = this.value.trim();
        if (rawQuery.length < 2) {
            resultsDiv.classList.add('d-none');
            return;
        }

        fetch(`/api/nps-suggestions/?q=${encodeURIComponent(rawQuery)}`)
            .then(response => response.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                
                const appendNotFoundOption = () => {
                    const notFoundDiv = document.createElement('div');
                    notFoundDiv.className = 'autocomplete-item text-danger border-top fw-bold';
                    notFoundDiv.innerHTML = `<i class="fas fa-paper-plane me-2"></i>Not Found – Send to Admin`;
                    notFoundDiv.addEventListener('click', () => {
                        reportMissingInstrument(rawQuery);
                        resultsDiv.classList.add('d-none');
                    });
                    resultsDiv.appendChild(notFoundDiv);
                };

                if (data.length > 0) {
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        div.innerHTML = `<span class="fw-bold">${item.name}</span><br><small class="text-muted">Code: ${item.symbol} | NAV: ₹${item.nav}</small>`;
                        div.addEventListener('click', () => {
                            nameInput.value = item.name;
                            if (item.nav > 0) {
                                navInput.value = item.nav;
                                navInput.dispatchEvent(new Event('input', { bubbles: true }));
                            } else {
                                // Fetch NAV dynamically for the scheme code
                                fetch(`/api/nps-suggestions/?q=${encodeURIComponent(item.symbol)}`)
                                    .then(res => res.json())
                                    .then(detailData => {
                                        if (detailData && detailData.length > 0 && detailData[0].nav > 0) {
                                            navInput.value = detailData[0].nav;
                                            navInput.dispatchEvent(new Event('input', { bubbles: true }));
                                        }
                                    })
                                    .catch(err => console.error("Error fetching NPS NAV:", err));
                            }
                            resultsDiv.classList.add('d-none');
                        });
                        resultsDiv.appendChild(div);
                    });
                    appendNotFoundOption();
                    resultsDiv.classList.remove('d-none');
                } else {
                    appendNotFoundOption();
                    resultsDiv.classList.remove('d-none');
                }
            });
    });

    function calculate() {
        const units = parseFloat(unitsInput.value) || 0;
        const nav = parseFloat(navInput.value) || 0;
        const amount = parseFloat(amountInput.value) || 0;

        if (document.activeElement === amountInput) {
            if (amount > 0 && units > 0) navInput.value = (amount / units).toFixed(4);
            else if (amount > 0 && nav > 0) unitsInput.value = (amount / nav).toFixed(4);
        } else {
            if (units > 0 && nav > 0) amountInput.value = (units * nav).toFixed(2);
        }
    }

    unitsInput.addEventListener('input', calculate);
    navInput.addEventListener('input', calculate);
    amountInput.addEventListener('input', calculate);

    document.addEventListener('click', (e) => {
        if (!nameInput.contains(e.target) && !resultsDiv.contains(e.target)) {
            resultsDiv.classList.add('d-none');
        }
    });
});
</script>
{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8">
        <div class="text-center mb-5">
            <h1 class="fw-800 text-nps">Add NPS Investment</h1>
            <p class="text-muted">Record your purchase details. We'll track FIFO logs automatically.</p>
        </div>
        
        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4 position-relative">
                    <label for="fund_name" class="form-label">NPS Scheme Name</label>
                    <input type="text" name="fund_name" id="fund_name" class="form-control" placeholder="Search for NPS Scheme..." autocomplete="off" required value="{{ request.GET.fund|default:'' }}">
                    <div id="nps-autocomplete-results" class="autocomplete-results d-none"></div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="units" class="form-label">Total Units</label>
                        <input type="number" step="0.0001" name="units" id="units" class="form-control" placeholder="0.0000" required min="0.0001">
                    </div>
                    <div class="col-md-4">
                        <label for="avg_nav" class="form-label">Avg NAV (INR)</label>
                        <input type="number" step="0.0001" name="avg_nav" id="avg_nav" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-4">
                        <label for="invested_amount" class="form-label">Invested Amount (INR)</label>
                        <input type="number" step="0.01" id="invested_amount" class="form-control" placeholder="0.00">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="date" class="form-label">Investment Date</label>
                    <input type="date" name="date" id="date" class="form-control" value="{{ today_str }}" max="{{ today_str }}">
                </div>
                
                <button type="submit" class="btn btn-submit">
                    <i class="fas fa-plus-circle me-2"></i>Add to Portfolio
                </button>
                
                <div class="mt-4 pt-3 border-top text-center">
                    <a href="{% url 'nps_dashboard' %}" class="text-decoration-none fw-600 text-nps">
                        <i class="fas fa-arrow-left me-2"></i>Back to NPS Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
