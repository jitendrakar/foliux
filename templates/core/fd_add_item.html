{% extends "base.html" %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(100, 116, 139, 0.1);
    }
    .form-label {
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
    }
    .form-control, .form-select {
        border-radius: 12px;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        transition: all 0.3s;
    }
    .form-control:focus, .form-select:focus {
        border-color: #475569;
        box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.1);
    }
    .btn-submit {
        background: linear-gradient(135deg, #475569 0%, #64748b 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(100, 116, 139, 0.2);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8">
        <div class="text-center mb-5">
            <h1 class="fw-800 text-fd" style="color: #475569;">Add Fixed Asset</h1>
            <p class="text-muted">Record your FD, PPF, or other fixed instrument.</p>
        </div>
        
        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="asset_type" class="form-label">Asset Type</label>
                    <select name="asset_type" id="asset_type" class="form-select">
                        <option value="FD">Fixed Deposit (FD)</option>
                        <option value="RD">Recurring Deposit (RD)</option>
                        <option value="PPF">PPF</option>
                        <option value="EPF">EPF / PF</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label for="instrument_name" class="form-label">Instrument Name</label>
                    <input type="text" name="instrument_name" id="instrument_name" class="form-control" placeholder="e.g. SBI FD, Post Office RD, PPF" value="{{ prefill.instrument_name|default:'' }}" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="holder_name" class="form-label">FD Holder Name & Relation</label>
                        <input type="text" name="holder_name" id="holder_name" class="form-control" placeholder="e.g. Name (Self)" value="{{ prefill.holder_name|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label for="fd_id" class="form-label">FD ID</label>
                        <input type="text" name="fd_id" id="fd_id" class="form-control" placeholder="Unique FD number" value="{{ prefill.fd_id|default:'' }}">
                    </div>
                </div>
                
                <div id="fd_fields">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="invested_amount" class="form-label">Invested Amount (INR)</label>
                            <input type="number" step="0.01" name="invested_amount" id="invested_amount" class="form-control" placeholder="0.00" value="{{ prefill.invested_amount|default:'0.00' }}">
                        </div>
                        <div class="col-md-6">
                            <label for="interest_rate" class="form-label">Annual Interest Rate (%)</label>
                            <input type="number" step="0.01" name="interest_rate" id="interest_rate" class="form-control" placeholder="e.g. 7.1" value="{{ prefill.interest_rate|default:'' }}" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="investment_date" class="form-label">Investment Date</label>
                            <input type="date" name="investment_date" id="investment_date" class="form-control" max="{% now 'Y-m-d' %}" required>
                        </div>
                        <div class="col-md-6" id="maturity_date_container">
                            <label for="maturity_date" class="form-label">Maturity Date (Optional)</label>
                            <input type="date" name="maturity_date" id="maturity_date" class="form-control">
                        </div>
                    </div>
                </div>

                <div id="rd_fields" class="{% if prefill.asset_type != 'RD' %}d-none{% endif %}">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label for="monthly_deposit" class="form-label">Monthly Deposit (INR)</label>
                            <input type="number" step="0.01" name="monthly_deposit" id="monthly_deposit" class="form-control" placeholder="5000.00" value="{{ prefill.monthly_deposit|default:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label for="tenure_years" class="form-label">Tenure (Years)</label>
                            <input type="number" name="tenure_years" id="tenure_years" class="form-control" placeholder="e.g. 2" min="1" max="50" value="{{ prefill.tenure_years|default:'' }}">
                        </div>
                    </div>
                </div>

                <script>
                    document.getElementById('asset_type').addEventListener('change', function() {
                        const isRD = this.value === 'RD';
                        const fdFields = document.getElementById('fd_fields');
                        const rdFields = document.getElementById('rd_fields');
                        const investedAmount = document.getElementById('invested_amount');
                        const monthlyDeposit = document.getElementById('monthly_deposit');
                        const tenureYears = document.getElementById('tenure_years');
                        const maturityContainer = document.getElementById('maturity_date_container');

                        if (isRD) {
                            rdFields.classList.remove('d-none');
                            maturityContainer.classList.add('d-none');
                            investedAmount.required = false;
                            monthlyDeposit.required = true;
                            tenureYears.required = true;
                        } else {
                            rdFields.classList.add('d-none');
                            maturityContainer.classList.remove('d-none');
                            investedAmount.required = true;
                            monthlyDeposit.required = false;
                            tenureYears.required = false;
                        }
                    });
                </script>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus-circle me-2"></i>Add to Portfolio
                </button>
                
                <div class="mt-4 pt-3 border-top text-center">
                    <a href="{% url 'fd_dashboard' %}" class="text-decoration-none fw-600" style="color: #475569;">
                        <i class="fas fa-arrow-left me-2"></i>Back to Fixed Assets Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
