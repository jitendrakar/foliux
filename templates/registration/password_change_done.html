{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 text-center">
            <div class="card-body p-5">
                <div class="mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success text-white rounded-circle mb-3"
                        style="width: 64px; height: 64px;">
                        <i class="fas fa-check fa-lg"></i>
                    </div>
                    <h3 class="fw-bold">Password Changed!</h3>
                    <p class="text-muted">Your password has been successfully updated. You can now continue using FOLIUX
                        with your new password.</p>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-primary py-2 fw-bold shadow-sm">
                        Go to Dashboard <i class="fas fa-arrow-right ms-2"></i>
                    </a>
                    <a href="{% url 'edit_profile' %}" class="btn btn-outline-secondary py-2 fw-bold">Back to
                        Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
