<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Gallery - Success Academy Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Admin custom styling -->
    <link href="../assets/css/admin-style.css" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>
    
    <div class="admin-content-area">
        <!-- Header Placeholder -->
        <div id="admin-header-placeholder"></div>
        
        <div class="admin-body">
            
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center" id="gallery-header-box">
                    <!-- Dynamic Header -->
                </div>
                
                <div class="card-body">
                    <!-- LIST SECTION -->
                    <div id="gallery-list-view" style="display:none;">
                        <div class="row g-4" id="gallery-grid">
                            <!-- Dynamic images -->
                        </div>
                    </div>
                    
                    <!-- UPLOAD SECTION -->
                    <div id="gallery-form-view" style="display:none;">
                        <form id="galleryForm" style="max-width: 550px;">
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Photo Title / Caption *</label>
                                <input type="text" class="form-control" id="g_title" placeholder="e.g. Independence Day Flag Hoisting" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Category *</label>
                                <select class="form-select" id="g_category" required>
                                    <option value="campus">Campus Tour</option>
                                    <option value="classroom">Smart Classrooms</option>
                                    <option value="events">Academic Events</option>
                                    <option value="annual">Annual Functions</option>
                                    <option value="awards">Award Ceremonies</option>
                                </select>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Select Image File *</label>
                                <input type="file" class="form-control" id="g_file" accept="image/jpeg, image/jpg, image/png" required>
                                <div class="form-text text-muted small">Only JPEG, JPG, and PNG files up to 3MB are supported.</div>
                            </div>
                            
                            <button type="submit" class="btn btn-secondary text-white px-4 py-2"><i class="fa-solid fa-upload me-2"></i> Upload Photo File</button>
                            <a href="gallery.html" class="btn btn-light border ms-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
            
        </div> <!-- Close admin-body -->
        
        <!-- Footer Placeholder -->
        <div id="admin-footer-placeholder"></div>
    </div> <!-- Close admin-content-area -->
</div> <!-- Close admin-wrapper -->

<!-- Scripts -->
<script src="../assets/js/db.js"></script>
<script src="admin-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!window.DB) return;
    
    const db = window.DB;
    const params = new URLSearchParams(window.location.search);
    const act = params.get('act') || 'list';
    
    const headerBox = document.getElementById('gallery-header-box');
    const listView = document.getElementById('gallery-list-view');
    const formView = document.getElementById('gallery-form-view');
    
    if (act === 'list') {
        headerBox.innerHTML = `
            <h5 class="fw-bold mb-0 text-primary-dark"><i class="fa-solid fa-images text-secondary me-2"></i> Campus Gallery Management</h5>
            <a href="gallery.html?act=upload" class="btn btn-primary btn-sm"><i class="fa-solid fa-cloud-arrow-up me-1"></i> Upload New Photo</a>
        `;
        listView.style.display = 'block';
        
        const grid = document.getElementById('gallery-grid');
        const list = db.getAllGalleryAdmin();
        
        if (list.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center text-muted py-4">No gallery items configured. Click upload to add one.</div>';
        } else {
            let cards = '';
            list.forEach(g => {
                cards += `
                    <div class="col-xl-3 col-lg-4 col-sm-6">
                        <div class="card border shadow-sm h-100">
                            <img src="${g.image_path}" class="card-img-top" style="height: 180px; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=300'" alt="Gallery item">
                            <div class="card-body p-3">
                                <h6 class="fw-bold text-dark mb-1 small text-truncate" title="${g.title}">${g.title}</h6>
                                <span class="badge bg-light text-primary border small text-uppercase mb-3">${g.category}</span>
                                <div class="d-grid mt-2 border-top pt-2">
                                    <button class="btn btn-outline-danger btn-sm py-1" onclick="deleteItem(${g.id})"><i class="fa-solid fa-trash me-2"></i>Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = cards;
        }
        
    } else if (act === 'upload') {
        headerBox.innerHTML = `
            <h5 class="fw-bold mb-0 text-primary-dark"><i class="fa-solid fa-images text-secondary me-2"></i> Upload Photo</h5>
            <a href="gallery.html" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-arrow-left me-1"></i> Back to List</a>
        `;
        formView.style.display = 'block';
        
        document.getElementById('galleryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('g_title').value.trim();
            const category = document.getElementById('g_category').value;
            const fileInput = document.getElementById('g_file');
            
            const saveGallery = (imgBase64) => {
                if (db.saveGalleryItem({
                    title: title,
                    category: category,
                    image_path: imgBase64
                })) {
                    window.location.href = 'gallery.html';
                }
            };
            
            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    saveGallery(event.target.result);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert('Please choose an image file.');
            }
        });
    }
});

function deleteItem(id) {
    if (confirm('Delete this image permanently?')) {
        if (window.DB && window.DB.deleteGalleryItem(id)) {
            window.location.reload();
        }
    }
}
</script>
</body>
</html>
