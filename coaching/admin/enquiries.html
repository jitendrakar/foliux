<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Enquiries - Success Academy Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Admin custom styling -->
    <link href="../assets/css/admin-style.css" rel="stylesheet">
</head>
<body>

<div class="admin-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>
    
    <div class="admin-content-area">
        <!-- Header Placeholder -->
        <div id="admin-header-placeholder"></div>
        
        <div class="admin-body">
            
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center" id="enquiries-header-box">
                    <!-- Dynamic Header -->
                </div>
                
                <div class="card-body">
                    <!-- LIST SECTION -->
                    <div id="enquiries-list-view" class="table-responsive" style="display:none;">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Mobile / Email</th>
                                    <th>Subject / Course</th>
                                    <th>Type</th>
                                    <th>Submitted On</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="enquiries-tbody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- DETAIL VIEW SECTION -->
                    <div id="enquiries-detail-view" style="display:none;">
                        <div class="row g-4" id="enquiry-detail-box">
                            <!-- Dynamic detail contents -->
                        </div>
                    </div>
                </div>
            </div>
            
        </div> <!-- Close admin-body -->
        
        <!-- Footer Placeholder -->
        <div id="admin-footer-placeholder"></div>
    </div> <!-- Close admin-content-area -->
</div> <!-- Close admin-wrapper -->

<!-- Scripts -->
<script src="../assets/js/db.js"></script>
<script src="admin-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!window.DB) return;
    
    const db = window.DB;
    const params = new URLSearchParams(window.location.search);
    const viewId = parseInt(params.get('view') || 0);
    
    const headerBox = document.getElementById('enquiries-header-box');
    const listView = document.getElementById('enquiries-list-view');
    const detailView = document.getElementById('enquiries-detail-view');
    
    if (viewId > 0) {
        // DETAIL VIEW MODE
        headerBox.innerHTML = `
            <h5 class="fw-bold mb-0 text-primary-dark"><i class="fa-solid fa-envelope-open-text text-secondary me-2"></i> Enquiry Reference # ${viewId}</h5>
            <a href="enquiries.html" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-arrow-left me-1"></i> Back to List</a>
        `;
        detailView.style.display = 'block';
        
        const e = db.getEnquiryById(viewId);
        const detailBox = document.getElementById('enquiry-detail-box');
        if (e && detailBox) {
            const submitDate = new Date(e.created_at).toLocaleString('en-IN');
            detailBox.innerHTML = `
                <div class="col-12" style="max-width: 750px; margin: 0 auto;">
                    <div class="bg-light p-4 rounded border my-3">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <span class="text-muted small d-block">Sender Name:</span>
                                <strong class="text-dark fs-5">${e.name}</strong>
                            </div>
                            <div class="col-sm-6">
                                <span class="text-muted small d-block">Enquiry Category:</span>
                                <span class="badge bg-primary px-3 py-2">${e.type}</span>
                            </div>
                            <div class="col-sm-6">
                                <span class="text-muted small d-block">Mobile Contact:</span>
                                <strong class="text-dark">${e.phone}</strong>
                            </div>
                            <div class="col-sm-6">
                                <span class="text-muted small d-block">Email Address:</span>
                                <strong class="text-dark"><a href="mailto:${e.email}">${e.email}</a></strong>
                            </div>
                            <div class="col-12 border-top pt-2">
                                <span class="text-muted small d-block">Subject / Target:</span>
                                <strong class="text-secondary">${e.subject || 'General Enquiry'}</strong>
                            </div>
                            <div class="col-12 border-top pt-2">
                                <span class="text-muted small d-block mb-1">Message Content:</span>
                                <div class="bg-white p-3 rounded border text-dark" style="white-space: pre-wrap; min-height: 100px; font-size: 15px;">${e.message}</div>
                            </div>
                            <div class="col-12 text-muted small border-top pt-2">
                                <i class="fa-regular fa-clock me-1"></i> Submitted On: ${submitDate}
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="enquiries.html" class="btn btn-outline-primary"><i class="fa-solid fa-chevron-left me-2"></i> Back to List</a>
                        <button class="btn btn-danger" onclick="deleteEnquiryAndRedirect(${e.id})"><i class="fa-solid fa-trash me-2"></i> Delete Enquiry</button>
                    </div>
                </div>
            `;
        }
        
    } else {
        // LIST VIEW MODE
        headerBox.innerHTML = `
            <h5 class="fw-bold mb-0 text-primary-dark"><i class="fa-solid fa-envelope-open-text text-secondary me-2"></i> Contact &amp; Quick Callback Enquiries</h5>
        `;
        listView.style.display = 'block';
        
        const tbody = document.getElementById('enquiries-tbody');
        const list = db.getEnquiries();
        
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No enquiries logged.</td></tr>';
        } else {
            let rows = '';
            list.slice().reverse().forEach(e => {
                const subDate = new Date(e.created_at).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                rows += `
                    <tr>
                        <td><strong>${e.name}</strong></td>
                        <td>
                            <div>${e.phone}</div>
                            <small class="text-muted">${e.email}</small>
                        </td>
                        <td><small class="text-truncate d-block" style="max-width: 200px;">${e.subject || 'General Enquiry'}</small></td>
                        <td>
                            <span class="badge ${e.type === 'General Enquiry' ? 'bg-info text-white' : 'bg-warning text-dark'}">
                                ${e.type}
                            </span>
                        </td>
                        <td><small>${subDate}</small></td>
                        <td class="text-end">
                            <a href="enquiries.html?view=${e.id}" class="btn btn-outline-primary btn-sm me-1"><i class="fa-solid fa-eye"></i> View</a>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteEnquiry(${e.id})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = rows;
        }
    }
});

function deleteEnquiry(id) {
    if (confirm('Are you sure you want to delete this enquiry record?')) {
        if (window.DB && window.DB.deleteEnquiry(id)) {
            window.location.reload();
        }
    }
}

function deleteEnquiryAndRedirect(id) {
    if (confirm('Are you sure you want to delete this enquiry record?')) {
        if (window.DB && window.DB.deleteEnquiry(id)) {
            window.location.href = 'enquiries.html';
        }
    }
}
</script>
</body>
</html>
