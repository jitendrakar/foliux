{% extends 'salon/dashboard/base.html' %}

{% block header_title %}{{ action }} Stylist{% endblock %}

{% block dashboard_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="dashboard-form-card">
            <h3 class="font-luxury text-gold mb-4 border-bottom pb-2">{{ action }} Stylist Details</h3>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted">Stylist Name</label>
                        <input type="text" name="name" class="form-control" value="{{ stylist.name }}" placeholder="e.g. Rajesh Kumar" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted">Designation</label>
                        <input type="text" name="designation" class="form-control" value="{{ stylist.designation }}" placeholder="e.g. Master Stylist" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted">Experience</label>
                        <input type="text" name="experience" class="form-control" value="{{ stylist.experience }}" placeholder="e.g. 5 Years" required>
                    </div>

                    <div class="col-md-6 align-self-end">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="status" id="statusSwitch" {% if action == 'Add' or stylist.status %}checked{% endif %}>
                            <label class="form-check-label fw-bold text-muted" for="statusSwitch">Stylist Active Status</label>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold text-muted">Professional Biography</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Brief details about stylist background, specialization and academy training details..." required>{{ stylist.description }}</textarea>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label fw-bold text-muted">Profile Photo</label>
                        {% if stylist.photo %}
                        <div class="mb-2">
                            <span class="small text-muted">Current photo:</span><br>
                            <img src="{{ stylist.get_photo }}" alt="Current Photo" class="rounded-circle shadow-sm" style="width: 80px; height: 80px; object-fit: cover; border: 2px solid var(--gold);">
                        </div>
                        {% endif %}
                        <input type="file" name="photo" class="form-control">
                    </div>

                    <div class="col-12 mt-4 pt-3 border-top d-flex gap-3">
                        <button type="submit" class="btn btn-gold px-4">{{ action }} Stylist</button>
                        <a href="{% url 'salon:dashboard_stylists' %}" class="btn btn-outline-dark px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
