{% extends 'salon/dashboard/base.html' %}

{% block header_title %}{{ action }} Testimonial{% endblock %}

{% block dashboard_content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="dashboard-form-card">
            <h3 class="font-luxury text-gold mb-4 border-bottom pb-2">{{ action }} Testimonial</h3>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-muted">Customer Name</label>
                        <input type="text" name="customer_name" class="form-control" value="{{ testimonial.customer_name }}" placeholder="e.g. Priyanshu Sharma" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted">Rating (1 to 5 Stars)</label>
                        <select name="rating" class="form-select" required>
                            <option value="5" {% if testimonial.rating == 5 %}selected{% endif %}>5 Stars (Excellent)</option>
                            <option value="4" {% if testimonial.rating == 4 %}selected{% endif %}>4 Stars (Very Good)</option>
                            <option value="3" {% if testimonial.rating == 3 %}selected{% endif %}>3 Stars (Average)</option>
                            <option value="2" {% if testimonial.rating == 2 %}selected{% endif %}>2 Stars (Poor)</option>
                            <option value="1" {% if testimonial.rating == 1 %}selected{% endif %}>1 Star (Terrible)</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold text-muted">Review / Feedback Description</label>
                        <textarea name="review" class="form-control" rows="4" placeholder="Write review details..." required>{{ testimonial.review }}</textarea>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label fw-bold text-muted">Customer Profile Photo</label>
                        {% if testimonial.photo %}
                        <div class="mb-2">
                            <span class="small text-muted">Current photo:</span><br>
                            <img src="{{ testimonial.get_photo }}" alt="Current Photo" class="rounded-circle shadow-sm" style="width: 80px; height: 80px; object-fit: cover; border: 2px solid var(--gold);">
                        </div>
                        {% endif %}
                        <input type="file" name="photo" class="form-control">
                    </div>

                    <div class="col-md-4 align-self-end">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="status" id="statusSwitch" {% if action == 'Add' or testimonial.status %}checked{% endif %}>
                            <label class="form-check-label fw-bold text-muted" for="statusSwitch">Visible Status</label>
                        </div>
                    </div>

                    <div class="col-12 mt-4 pt-3 border-top d-flex gap-3">
                        <button type="submit" class="btn btn-gold px-4">{{ action }} Testimonial</button>
                        <a href="{% url 'salon:dashboard_testimonials' %}" class="btn btn-outline-dark px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
